<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Contact Information</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts\.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=merriweather:wght@300;700;900&family=Roboto:wght@400;700&display=swap">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-crossedoars.jpeg" alt="Rafting Company Logo">
        <nav>
            <ul>
            <li></li><a href="index.html">Home</a></li>
            <li></li><a href="about.html">About Us</a></li>
            <li></li><a href="trips.html">Trips</a></li>
            <li></li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main class="grid">
        <form action="#" class="contactform">
            <fieldset>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </fieldset>
            <fieldset class="radio-input">
                <input type="radio" id="general" name="gq" value="general" checked>
                <label for="general">General Question</label>
                <input type="radio" id="reservation" name="res" value="reservation">
                <label for="reservation">Reservation Question</label>
                <input type="radio" id="Website" name="web" value="Website">
                <label for="Website">Website Suggestion</label>
            </fieldset>
            <fieldset>
                <label for="Message">Message:</label>
                <textarea name="Message" id="Message" cols="30" rows="10"></textarea>
            </fieldset>
            <div class="signup">
                <input type="checkbox" name="newsletter" id="newsletter">
                <label for="newsletter">Please Subscribe me to the monthly newsletter</label>
            </div>
            <button type="submit">Send Message</button>
        </form>
        <section class="address">
            <h2> Our Contact Info</h2>
            <address>Ad124venture Lane, Wild River, USA</address>
            <a href="tel:+ 1 (555) 123-34287"></a>
            <a href="mailto:info@company.com">info@company.com"</a>
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d93087.14224922919!2d-13.246597882901229!3d8.473984749395116!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2ssl!4v1749482192951!5m2!1sen!2ssl"
                width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade" class="gmap"></iframe>
        </section>
        </iframe>
        </div>
        <div class="section">
            <h2>Meet our Employees</h2>
            <div class="Employee-gallery">
                <figure>
                    <img src="https://randomuser.me/api/portraits/men/68.jpg" alt="employee1">
                    <figcaption>Micheal Johnson - Rafting MD</figcaption>
                </figure>
                <figure>
                    <img src="https://randomuser.me/api/portraits/men/45.jpg" alt="employee2">
                    <figcaption>Bob smith - Rafting Accountant</figcaption>
                </figure>
                <figure>
                    <img src="https://randomuser.me/api/portraits/women/75.jpg" alt="employee3">
                    <figcaption>Susan Brown - Data Analyst</figcaption>
                </figure>
            </div>
            </section>
    </main>
    <footer>
        <footer class="footer">
            <p>©2025 Rafting Company | John Saffa Follow us:</p>
            <nav class="socialmedia">
                <a href="https://facebook.com" target="_blank">
                    <img src="images/facebook.svg" alt="Facebook">
                </a>
                <a href="https://twitter.com" target="_blank"><img src="images/x-twitter.svg" alt="Twitter"></a>
                <a href="https://instagram.com" target="_blank">
                    <img src="images/instagram.svg" alt="Instagram">
                </a>
            </nav>
        </footer>
</body>

</html>
