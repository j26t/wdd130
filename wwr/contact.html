<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Contact Information</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts\.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=merriweather:wght@300;700;900&family=Roboto:wght@400;700&display=swap">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header class="site-header">
        <div class="logo"></div>
        <img src="images/z-crossedoars.jpeg" alt="Rafting Company Logo">
        <nav class="main-nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="section">
            <h1>Contact Us</h1>
            <div class="contact-info">
                <span class="label">
                    <Address:>
                </span>
                <span class="value">124 Adventure Lane, Wild River, USA</span>
            </div>
            <div class="contact-info">
                <span class="label">Phone:</span>
                <span class="value">+1 (555) 123-34287</span>
            </div>
            <div class="contact-info">
                <span class="label">Email:</span>
                <span class="value"><a href="mailto:info@company.com">info@company.com</a></span>
            </div>
            <div class="map">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d93087.14224922919!2d-13.246597882901229!3d8.473984749395116!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2ssl!4v1749482192951!5m2!1sen!2ssl"
                    width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade"></iframe>
                </iframe>
            </div>
            <div class="section">
                <h2>Meet our Employees</h2>
                <div class="Employee-gallery">
                    <figure>
                        <img src="images/employee1.jpg" alt="employee1">
                        <figcaption>John Saffa - Rafting MD</figcaption>
                    </figure>
                    <figure>
                        <img src="imeges/employee2.jpg" alt="employee2">
                        <figcaption>Alice Bull - Rafting Accountant</figcaption>
                    </figure>
                    <figure>
                        <img src="images/employee3.jpg" alt="employee3">
                        <figcaption>Bob Brown - Data Analyst</figcaption>
                    </figure>
                </div>
                <form>
                    <div class="section">
                        <h2>Contact Form</h2>
                        <label for="name">Username:</label>
                        <input type="text" id="username" name="username"></label>
                        <label for="email">EmailAddress:</label>
                        <input type="email" id="email" name="email"></label>
                        <label>Purpose Of Message:</label>
                        <div class="radio-group"><label><input type="radio" name="Purpose"
                                    value="General Inquiry">General Inquiry</label>
                            <label><input type="radio" name="purpose" value="Reservation Question">Reservation
                                Question</label>
                            <label><input type="radio " name="purpose" valve="Website suggestion">Website
                                suggestion</label>
                        </div>
                        <label for="Message">Your Message:</label>
                        <text area id="Message" name="user-mesage" row="5" required></textarea>
                            <div class="checkbox-group">
                                <label><input type="checkbox" name="subscribe">Please subscribe me to the monthly
                                    newsletter</label>
                            </div>
                            <button type="submit">Submit Message</button>
                </form>
            </div>
            </section>
    </main>
    <footer>
        <footer class="footer">
            <p>©2025 Rafting Company | John Saffa Follow us:</p>
            <nav class="socialmedia">

                <a href="https://twitter.com" target="_blank"><img src="images/x-twitter.svg" alt="Twitter"></a>
                <a href="https://instagram.com" target="_blank">
                    <img src="images/instagram.svg" alt="Instagram">
                </a>
            </nav>
        </footer>
