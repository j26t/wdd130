<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact White Water Adventures</title>
    <meta name="description"
        content="Get in touch with White Water Adventures for bookings, trip inquiries, or customer support. we are here to help plan your next Adventure.">
    <meta name="author" content="John Saffa">
    <link rel="stylesheet" href="rafting.css">
</head>

<body class="contact-page">
    <header>
        <div class="logo">
            <img src="images/logo.jpg" alt="company logo">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact us</a></li>
            </ul>
        </nav>
    </header>
    <section class="contact-info">
        <h1>Company Information</h1>
        <p>6 Guy Street Krootown Road</p>
        <p>Freetown, Sierra leone</p>
        <p>+2 32124567</p>
        <p>info@White Water Adventures.com</p>
    </section>
    <main class="contact-section">
        <div class="container">
            <div class="map">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d6888.6904755454925!2d-13.243617906995057!3d8.483299028021666!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2ssl!4v1759414532402!5m2!1sen!2ssl"
                    width="600" height="450" allowfullscreen="" loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <div class="contact-form">
            </div>
            <div class="container">
            </div>
            <form>
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="placeholder">
                <br>
                <label for="email">Email</label>
                <input type="email" id="email" name="useremail" placeholder="placeholder">
                <br>
                <p>Message<br>Purpose
                </p>
                <br>
                <input type="radio" id="generalinquiry" name="purpose" value="general inquiry">
                <label for="generalinquiry">General Inquiry</label>
                <br>
                <br><input type="radio" id="ReservationQuestion" name="purpose" value="Reservation Question">
                <label for="ReservationQuestion">Reservation Question</label>
                <br>
                <input type="radio" id="WebsiteSuggestion" name="suggestion" value="Website Suggestion">
                <label for="WebsiteSuggestion">Website Suggestion</label>
                <br>
                <label for="text">Message</label>
                <br>
                <textarea id="text" name="text" placeholder="type here"></textarea>
                <br>
                <input type="checkbox" id="subscribe" name="subscribe" value="subscribe">
                <label for="subscribe">Please subscribe me to the monthly news letter</label>
                <br>
                <button type="submit">get in touch</button>
            </form>
        </div>
        </section>
    </main>
    <section class="contact-info">
        <h2>We Are Here To Serve You</h2>
        <div class="employee-profile">
            <figure>
                <img src="images/employee1.jpg" alt="our employees">
                <figcaption>Employee</figcaption>
            </figure>
            <figure>
                <img src="images/employee2.jpg" alt="our employees">
                <figcaption>Employee</figcaption>
            </figure>
            <figure>
                <img src="images/employee3.jpg" alt="our employees">
                <figcaption>Employee</figcaption>
            </figure>
        </div>
    </section>
    <footer>
        <p>Footer content including Social Media Icons/links</p>
        <div class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook icon"></a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.png" alt="Linkedin icon"></a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram icon"></a>
        </div>
    </footer>
</body>
</html>
