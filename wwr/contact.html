    </body>
    <main>
    <main class="grid contactus">
        <form action="#" class="contactform">
            <fieldset>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="emaiaddress" required>
            </fieldset>
            <fieldset class="radio-input">
                <input type="radio" id="general" name="drone" value="general" checked>
                <label for="general">General Question</label>
                <input type="radio" id="reservation" name="res" value="reservation">
                <label for="reservation">Reservation Question</label>
                <input type="radio" id="Website" name="web" value="Website">
                <label for="Website">Website Suggestion</label>
            </fieldset>
            <fieldset>
                <label for="Message">Message:</label>
                <textarea name="Message" id="Message" cols="30" rows="10"></textarea>
            </fieldset>
            <div class="signup">
                <input type="checkbox" name="newsletter" id="newsletter">
                <label for="newsletter">Please Subscribe me to the monthly newsletter</label>
            </div>
            <button type="submit" class="submit-button">Send Message</button>
        </form>
        <section class="address">
            <h2> Our Contact Info</h2>
            <address>52 charles street , Freetown Sierra leone</address>
            <a href="tel:+23288774567"></a>
            <a href="mailto:info@company.com">info@company.com"</a>
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d93087.14224922919!2d-13.246597882901229!3d8.473984749395116!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2ssl!4v1749482192951!5m2!1sen!2ssl"
                width="600" height="450" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
                class="gmap">
        </section>
        </iframe>
        <section class="grid Employees">
            <h2>Meet our Employees</h2>
            <figure>
                <img src="https://randomuser.me/api/portraits/men/63.jpg" alt="MD">
                <figcaption>Micheal Johnson - Rafting MD</figcaption>
            </figure>
            <figure>
                <img src="https://randomuser.me/api/portraits/men/44.jpg" alt="Accountant">
                <figcaption>Bob smith - Rafting Accountant</figcaption>
            </figure>
            <figure>
                <img src="https://randomuser.me/api/portraits/women/75.jpg" alt="Data Analyst">
                <figcaption>Susan Brown - Data Analyst</figcaption>
            </figure>
        </section>
    </main>
