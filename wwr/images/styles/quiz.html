<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>basic Quiz form</title>
    <link rel="stylesheet" href="quiz.css">
</head>

<body>
    <main class="box">
        <h1>✓Basic HTML and css quiz</h1>
        <form class="box">
            <div class="quiz-item ">
                <label for="q1">1.What does the acronym css stand for? </label>
                <input type="text" id="q1" name="q1">
            </div>
            <div class="quiz-item">
                <label for="q1">2.How are id and class attributes selected in css? </label>
                <textarea id="q2" name="q2"></textarea>
            </div>
            <div class="quiz-item ">
                <label for="q1">3.Which of the following is a valid css comment? </label>
                <select id="q3" name="q3">
                    <option value="" selected disabled>Choose one ...</option>
                    <option value="a">A.&lt;!--This a a comment--&gt;</option>
                    <option value="b">B./*This is a comment</option>
                    <option value="c">C.//This ia comment</option>
                </select>
            </div>
            <div class="quiz-item">
                <label for="q1">4.What is the botttom margin given this
                    declaration?</label>
                <code class="box">margin: 10px 5px 15px;</code>
                <input type="text" id="q4" name="q4">
            </div>
            <button type="submit">Submit Quiz</button>
        </form>
    </main>
</body>

</html>
